apiVersion: 1

contactPoints:
  - orgId: 1
    name: rabbitmq-email
    receivers:
      - uid: rabbitmq_email
        type: email
        settings:
          addresses: radutudorion@gmail.com
          singleEmail: false
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: rabbitmq-email
    group_by:
      - grafana_folder
      - alertname
      - severity
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: rabbitmq-email
        object_matchers:
          - ['severity', '=', 'critical']
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 30m
        continue: false

      - receiver: rabbitmq-email
        object_matchers:
          - ['severity', '=', 'warning']
        group_wait: 30s
        group_interval: 10m
        repeat_interval: 2h
        continue: false
